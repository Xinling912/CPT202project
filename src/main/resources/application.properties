# ===============================
# Database Connection Settings
# ===============================
# Database name is set to booking_system. It will auto-create if not exists.
spring.datasource.url=jdbc:mysql://localhost:3306/booking_system?createDatabaseIfNotExist=true&serverTimezone=UTC

# TODO: You must change the username and password to their own local MySQL credentials!
# DO NOT commit your real password to Git!
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE 

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Settings
# ===============================
spring.jpa.database=mysql

# Automatically create or update database tables based on Entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL statements in the console for easy debugging
spring.jpa.show-sql=true